
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Block Off</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="header">
    <img src="icons/icon48.png" class="logo" />
    <div>
        <h1>Block Off</h1>
        <p class="subtitle">Site safety overview</p>
    </div>
</div>

<!-- Actions -->
<div class="section">
    <button id="enable" class="primary">Enable warnings</button>
    <button id="disable">Disable warnings</button>
</div>

<!-- AUTH SECTION -->
<div class="section" id="auth-section">
<input id="login-email" type="email" placeholder="Email" />
<input id="login-password" type="password" placeholder="Password" />
<button id="login" class="primary">Log in</button>

<p class="auth-note">
    Don’t have an account?
    <a href="https://your-site.com/signup" target="_blank">Create one</a>
</p>
</div>


<!-- Report Site -->
<div class="section">
    <button id="report" class="danger">🚩 Report this site</button>

    <div class="info">
        <div>Domain age: <span id="domain-age">Loading...</span></div>
        <div>Reports: <span id="report-count">Loading...</span></div>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
